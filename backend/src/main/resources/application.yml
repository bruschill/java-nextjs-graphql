server:
  port: 8080

spring:
  graphql:
    graphiql:
      enabled: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    enabled: ${APP_AUTH_ENABLED:false}
    jwt-secret: ${APP_AUTH_JWT_SECRET:replace-this-with-a-long-jwt-secret-at-least-32-bytes}
