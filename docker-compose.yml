services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_AUTH_ENABLED: "false"
      APP_AUTH_JWT_SECRET: replace-this-with-a-long-jwt-secret-at-least-32-bytes
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://backend:8080/graphql
      NEXT_PUBLIC_API_TOKEN: ""
    ports:
      - "3000:3000"
    depends_on:
      - backend
